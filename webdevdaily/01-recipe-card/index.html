<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Crêpes</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <article class="card">
        <div class="card__border">
          <img
            src="./imgs/basic-crepes.png"
            alt="A crêpe with strawberries"
            class="card__img"
          />
          <h1 class="card__heading">Basic Crêpes</h1>
          <hr class="card__divider" />
          <section class="card__stats">
            <dl class="card__stat">
              <dd class="card__number">30</dd>
              <dt class="card__label">Minutes</dt>
            </dl>
            <dl class="card__stat">
              <dd class="card__number">6</dd>
              <dt class="card__label">Ingredients</dt>
            </dl>
            <dl class="card__stat">
              <dd class="card__number">4</dd>
              <dt class="card__label">Serving</dt>
            </dl>
          </section>
          <p class="card__description">
            This simple but delicious crêpe recipe can be made in minutes from
            ingredients that everyone has on hand.
          </p>
          <button class="card__button">View Recipe</button>
        </div>
      </article>
    </main>
  </body>
</html>
