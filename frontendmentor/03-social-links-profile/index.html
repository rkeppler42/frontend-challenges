<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Links Profile</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <article class="card">
      <img
        src="imgs/zoe-profile-picture.png"
        alt="A picture of a pixelated dog wearing a cow shirt"
        class="card__img"
      />
      <h1 class="card__name">Roberto Keppler</h1>
      <p class="card__location">Salvador, Brazil</p>
      <p class="card__description">"Full-stack developer in the making"</p>
      <ul class="card__links">
        <li class="card__link">
          <a
            href="https://github.com/rkeppler42"
            target="_blank"
            rel="noopener noreferrer"
            class="card__link-anchor"
            >GitHub</a
          >
        </li>
        <li class="card__link">
          <a
            href="https://www.frontendmentor.io/profile/rkeppler42"
            class="card__link-anchor"
            target="_blank"
            rel="noopener noreferrer"
            >Frontend Mentor</a
          >
        </li>
        <li class="card__link">
          <a
            href="https://www.linkedin.com/in/rkeppler42/"
            class="card__link-anchor"
            target="_blank"
            rel="noopener noreferrer"
            >LinkedIn</a
          >
        </li>
        <li class="card__link">
          <a
            href="#"
            class="card__link-anchor"
            target="_blank"
            rel="noopener noreferrer"
            >Twitter</a
          >
        </li>
        <li class="card__link">
          <a
            href="#"
            class="card__link-anchor"
            target="_blank"
            rel="noopener noreferrer"
            >Instagram</a
          >
        </li>
      </ul>
    </article>
  </body>
</html>
